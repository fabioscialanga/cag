name: Bug report
description: Report a reproducible problem in the CAG preview
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for someone else to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the exact steps required to reproduce the issue.
      placeholder: |
        1. Install dependencies
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, provider path, and any relevant local setup detail.
      placeholder: Windows 11, Python 3.11, OpenAI provider, local Chroma
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste the relevant error message, stack trace, or artifact excerpt.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add benchmark commands, document details, or screenshots if helpful.
