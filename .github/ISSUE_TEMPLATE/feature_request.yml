name: Feature request
description: Suggest an improvement for the CAG preview
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.
        Please keep the request concrete and tied to a real user or builder need.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing or painful today?
      placeholder: I want CAG to support...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: Explain the expected benefit for AI builders, evaluation, or first-run usability.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround or alternative approach you already considered.
